version: "3.8"

services:
  neo4j:
    image: neo4j:5
    container_name: codemind-neo4j
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      - NEO4J_AUTH=neo4j/codemind123
    volumes:
      - neo4j_data:/data

  redis:
    image: redis:7
    container_name: codemind-redis
    ports:
      - "6379:6379"
    # volumes:
    #   - redis_data:/data

volumes:
  neo4j_data:
  # redis_data: